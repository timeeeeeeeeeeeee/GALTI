<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生重开模拟器 - 20个世界等你探索</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--card:#151530;--accent:#7c5cbf;--accent2:#e85898;--text:#e8e8f0;--dim:#8888aa;--border:#2a2a50}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.page{display:none;min-height:100vh;padding:15px;max-width:900px;margin:0 auto}
.page.active{display:flex;flex-direction:column;align-items:center}
h1{font-size:2.5em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:20px 0 10px;text-align:center}
h2{font-size:1.5em;color:var(--accent);margin:15px 0 8px;text-align:center}
h3{color:var(--text);margin:10px 0;text-align:center}

/* Start page */
.start-logo{font-size:5em;margin:30px 0 10px;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.start-desc{color:var(--dim);max-width:550px;text-align:center;line-height:1.8;margin:10px 0 25px}
.start-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:16px 50px;font-size:1.2em;border-radius:50px;cursor:pointer;transition:transform .2s,box-shadow .2s}
.start-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(124,92,191,.4)}
.settings-btn{position:fixed;top:15px;right:15px;background:var(--card);border:1px solid var(--border);color:var(--dim);padding:8px 16px;border-radius:20px;cursor:pointer;z-index:100;font-size:.9em}
.settings-btn:hover{border-color:var(--accent);color:var(--text)}
.world-count{color:var(--dim);font-size:.85em;margin-top:10px}

/* Setup page */
.ls-steps{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:10px 0 20px;font-size:.8em;color:var(--dim)}
.ls-step.active{color:var(--accent);font-weight:bold}
.ls-grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;width:100%;max-width:700px;margin:10px auto}
.ls-world-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;width:100%;max-width:750px;margin:10px auto}
.ls-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:15px;border-radius:12px;cursor:pointer;text-align:center;transition:all .2s;line-height:1.5}
.ls-btn:hover{border-color:var(--accent);background:rgba(124,92,191,.1);transform:translateY(-2px)}
.ls-btn small{color:var(--dim);display:block;margin-top:4px;font-size:.8em}
.ls-btn.ls-world{display:flex;flex-direction:column;align-items:center;gap:4px}
.ls-back{background:transparent;border:1px solid var(--border);color:var(--dim);padding:8px 20px;border-radius:20px;cursor:pointer;margin-top:15px;transition:all .2s}
.ls-back:hover{border-color:var(--accent);color:var(--text)}
.ls-stat-alloc{width:100%;max-width:500px;margin:10px auto}
.ls-stat-row{display:flex;align-items:center;gap:8px;margin:10px 0}
.ls-stat-row span:first-child{width:80px;text-align:right}
.ls-pm{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1.1em;cursor:pointer;transition:all .2s}
.ls-pm:hover{border-color:var(--accent);background:rgba(124,92,191,.2)}
.ls-bar-bg{flex:1;height:10px;background:var(--bg);border-radius:5px;overflow:hidden}
.ls-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:5px;transition:width .3s}
.ls-go{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:12px 30px;font-size:1.1em;border-radius:25px;cursor:pointer;transition:transform .2s;margin-top:12px}
.ls-go:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(124,92,191,.4)}

/* Game page */
.lg-header{text-align:center;width:100%}
.lg-header h2{margin-bottom:5px}
.lg-stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.lg-stat{display:flex;align-items:center;gap:5px;font-size:.85em}
.lg-stat-bar{width:60px;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.lg-log{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px;width:100%;max-height:200px;overflow-y:auto;margin:10px 0}
.lg-entry{padding:5px 0;border-bottom:1px solid var(--border);font-size:.9em;line-height:1.5}
.lg-entry:last-child{border:none}
.lg-entry b{color:var(--accent);margin-right:8px}
.lg-event{background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:15px;width:100%;margin:10px 0}
.lg-event p{line-height:1.6;margin-bottom:10px}
.lg-opts{display:flex;flex-direction:column;gap:8px}
.lg-choice{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 15px;border-radius:8px;cursor:pointer;text-align:left;transition:all .2s;font-size:.95em}
.lg-choice:hover{border-color:var(--accent);background:rgba(124,92,191,.1)}
.lg-time{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center;margin:8px 0}
.lg-tbtn{background:var(--card);border:1px solid var(--border);color:var(--dim);padding:5px 12px;border-radius:15px;cursor:pointer;font-size:.8em;transition:all .2s}
.lg-tbtn:hover{border-color:var(--accent);color:var(--text)}

/* Death page */
.ld-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:25px;width:100%;max-width:700px;margin:15px auto}
.ld-stats{display:grid;gap:8px;margin:15px 0}
.ld-stat{display:flex;align-items:center;gap:10px}
.ld-stat>span:first-child{width:80px;text-align:right;font-size:.9em}
.ld-stat>span:last-child{width:30px;text-align:center;font-size:.9em;color:var(--dim)}
.ld-future{margin:10px 0}
.ld-future p{padding:8px 0;border-bottom:1px solid var(--border);line-height:1.6;font-size:.95em;color:var(--dim)}
.ld-timeline{margin:10px 0;max-height:300px;overflow-y:auto}
.ld-entry{padding:8px 0;border-bottom:1px solid var(--border);font-size:.9em;line-height:1.5}
.ld-entry b{color:var(--accent);margin-right:8px}

/* Modal */
#apiModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;padding:20px}
.lm-content{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:25px;max-width:450px;width:100%}
.lm-content label{display:block;color:var(--dim);font-size:.85em;margin:10px 0 4px}
.lm-content select,.lm-content input{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:.95em}
.lm-content select:focus,.lm-content input:focus{outline:none;border-color:var(--accent)}

@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease-out}
@media(max-width:600px){h1{font-size:1.8em}.ls-grid2,.ls-world-grid{grid-template-columns:1fr 1fr}.lg-stats{gap:5px}}
</style>
</head>
<body>

<button class="settings-btn" onclick="showApiModal()">⚙️ AI设置</button>

<!-- Start Page -->
<div id="lifeStartPage" class="page active">
  <div class="start-logo">🎮</div>
  <h1>人生重开模拟器</h1>
  <p class="start-desc">
    选择一个世界，设定你的身份和属性，<br>
    体验一段全新的人生旅程。<br>
    从20个不同世界中做出选择，<br>
    每个世界都有独特的身份、事件和结局等待着你。
  </p>
  <button class="start-btn" onclick="startLifeRestart()">🎲 开始新人生</button>
  <p class="world-count">包含20个世界 · 200+种身份 · 支持AI生成事件</p>
</div>

<!-- Setup Page -->
<div id="lifeSetupPage" class="page">
  <h2>创建你的角色</h2>
  <div id="lifeSetupContent"></div>
</div>

<!-- Game Page -->
<div id="lifeGamePage" class="page">
  <div id="lifeGameContent"></div>
</div>

<!-- Death Page -->
<div id="lifeDeathPage" class="page">
  <div id="lifeDeathContent"></div>
</div>

<!-- API Modal -->
<div id="apiModal"></div>

<script src="galti_life_data.js"></script>
<script src="galti_life.js"></script>
<script src="galti_life_ui.js"></script>
</body>
</html>
